services:
  - type: web
    name: alphasignal-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_WS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
